            font-size: 0.75rem;
            letter-spacing: 0.5px;

                    <button onclick="resetAllChecks()"
                            class="px-4 py-3 bg-white dark:bg-slate-800 hover:bg-slate-100 dark:hover:bg-slate-700 border border-slate-200 dark:border-slate-700 transition-colors text-sm font-semibold rounded-2xl flex items-center gap-2 text-slate-700 dark:text-slate-300">

                        <span class="hidden sm:inline">Reset</span>

                 class="bg-white dark:bg-slate-800 rounded-3xl border border-slate-200 dark:border-slate-700 overflow-hidden modern-shadow divide-y divide-slate-100 dark:divide-slate-700">
                <!-- Populated by JavaScript -->

            <div id="no-results" class="hidden text-center py-8 text-slate-400">
                <i class="fa-solid fa-search text-2xl mb-2"></i>
                <p class="text-sm">No sites found</p>

        <!-- Footer -->

            </p>

    </div>

        };

        // Short blurbs/summaries for each site
        const siteBlurbs = {
            "Spinquest": "The daily bonus is a banner at the top of the page. Click over to the second banner.",
            // Add more here, one per line
            "Acebet": "More explanations on the way....",
            "Wow Vegas": "",
            // ... etc for the rest
        };

        // State
        let checkedSites = new Set();
        let lastResetDate = '';
        let lastVisited = {};  // { site: timestamp } - persists across days

        function getTodayString() {
            const now = new Date();
            return now.getFullYear() + '-' + 
                   String(now.getMonth() + 1).padStart(2, '0') + '-' + 
                   String(now.getDate()).padStart(2, '0');
        }

        function loadState() {
            try {
                const savedChecked = localStorage.getItem('dailySiteCheck_checked');
                if (savedChecked) {
                    checkedSites = new Set(JSON.parse(savedChecked));
                }
                
                lastResetDate = localStorage.getItem('dailySiteCheck_lastReset') || '';
                
                const savedLastVisited = localStorage.getItem('dailySiteCheck_lastVisited');
                if (savedLastVisited) {
                    lastVisited = JSON.parse(savedLastVisited);
                }
            } catch (e) {
                console.warn('Could not load state from localStorage');
            }
        }

        function saveState() {
            try {
                localStorage.setItem('dailySiteCheck_checked', JSON.stringify([...checkedSites]));
                localStorage.setItem('dailySiteCheck_lastReset', lastResetDate);
                localStorage.setItem('dailySiteCheck_lastVisited', JSON.stringify(lastVisited));
            } catch (e) {
                console.warn('Could not save state to localStorage');
            }
        }

        function checkAndResetIfNeeded() {
            const today = getTodayString();
            
            if (lastResetDate !== today) {
                // New day - reset everything
                checkedSites.clear();
                lastResetDate = today;
                saveState();
                console.log('%c[Daily Site Check] New day detected — checks have been reset.', 'color:#64748b');
            }
        }

        function updateProgress() {
            const total = sites.length;
            const done = checkedSites.size;
            const percent = total > 0 ? Math.round((done / total) * 100) : 0;

            // Update text
            document.getElementById('progress-text').textContent = `${done} / ${total}`;
            document.getElementById('progress-percentage').textContent = `${percent}%`;
            
            // Update progress bar
            const bar = document.getElementById('progress-bar');
            bar.style.width = `${percent}%`;
            
            // Color the bar based on progress
            if (percent === 100) {
                bar.className = 'h-2.5 bg-emerald-500 rounded-full transition-all duration-300';
            } else if (percent > 60) {
                bar.className = 'h-2.5 bg-emerald-400 rounded-full transition-all duration-300';
            } else {
                bar.className = 'h-2.5 bg-blue-500 rounded-full transition-all duration-300';
            }
        }

        function updateDateDisplay() {
            const dateEl = document.getElementById('date-display');
            const today = new Date();
            dateEl.textContent = today.toLocaleDateString('en-US', { 
                weekday: 'short', 
                month: 'short', 
                day: 'numeric' 
            });
        }

        function formatLastVisited(timestamp) {
            if (!timestamp) return '';
            
            const date = new Date(timestamp);
            const now = new Date();
            const yesterday = new Date(now);
            yesterday.setDate(yesterday.getDate() - 1);
            
            if (date.toDateString() === now.toDateString()) {
                return 'Today ' + date.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
            } else if (date.toDateString() === yesterday.toDateString()) {
                return 'Yesterday ' + date.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
            } else {
                return date.toLocaleDateString([], { month: 'short', day: 'numeric' }) + 
                       ' ' + date.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
            }
        }

        function renderSites(filteredSites = null) {
            const container = document.getElementById('sites-list');
            const noResults = document.getElementById('no-results');
            
            container.innerHTML = '';
            
            const toRender = filteredSites || sites;
            
            if (toRender.length === 0) {
                noResults.classList.remove('hidden');
                return;
            } else {
                noResults.classList.add('hidden');
            }

            toRender.forEach(site => {
                const isChecked = checkedSites.has(site);
                const url = siteURLs[site] || '#';
                
                const row = document.createElement('div');
                row.className = `site-row flex items-center gap-3 px-5 py-4 group`;
                
                const lastTime = lastVisited[site] ? formatLastVisited(lastVisited[site]) : 'Never';
                
                row.innerHTML = `
                    <div class="flex-1 min-w-0">
                        <div class="font-medium text-[15px] text-slate-800 dark:text-slate-100 tracking-[-0.1px]">
                            ${toRender.indexOf(site) + 1}. ${site}
                        </div>
                        <div class="text-[10px] text-slate-400 dark:text-slate-500 mt-0.5 font-mono">
                            Last: ${lastTime}
                        </div>
                        ${siteBlurbs[site] ? `
                        <div class="text-xs text-slate-500 dark:text-slate-400 mt-1.5 leading-snug">
                            ${siteBlurbs[site]}
                        </div>` : ''}
                    </div>
                    
                    <!-- Visit Link -->
                    <a href="${url}" 
                       target="_blank" 
                       rel="noopener noreferrer"
                       class="flex items-center justify-center w-9 h-9 text-blue-600 hover:text-blue-700 dark:text-blue-400 dark:hover:text-blue-300 transition-colors rounded-xl hover:bg-blue-50 dark:hover:bg-blue-900/20 active:scale-95"
                       title="Open ${site} in new tab">
                        <i class="fa-solid fa-arrow-up-right-from-square text-lg"></i>
                    </a>
                    
                    <!-- Checkbox -->
                    <button 
                        class="flex items-center justify-center w-9 h-9 rounded-2xl transition-all active:scale-90 ${isChecked ? 'text-emerald-600' : 'text-slate-300 dark:text-slate-600 hover:text-slate-400'}"
                        onclick="toggleSite('${site.replace(/'/g, "\\'")}')">
                        <i class="fa-solid ${isChecked ? 'fa-check-circle text-emerald-600 text-3xl' : 'fa-circle text-3xl'} check-icon"></i>
                    </button>
                `;
                
                container.appendChild(row);
            });
        }

        function toggleSite(site) {
            if (checkedSites.has(site)) {
                checkedSites.delete(site);
            } else {
                checkedSites.add(site);
                // Record last visit time (when marked as visited)
                lastVisited[site] = Date.now();
            }
            
            saveState();
            updateProgress();
            
            // Re-render only this row for better performance (simple approach: full re-render)
            const searchValue = document.getElementById('search-input').value.toLowerCase().trim();
            if (searchValue) {
                const filtered = sites.filter(s => s.toLowerCase().includes(searchValue));
                renderSites(filtered);
            } else {
                renderSites();
            }
        }

        function markAllVisited() {
            const now = Date.now();
            sites.forEach(site => {
                checkedSites.add(site);
                lastVisited[site] = now;
            });
            saveState();
            updateProgress();
            renderSites();
            
            // Subtle success animation
            const container = document.getElementById('sites-list');
            container.style.transition = 'all 0.2s';
            container.style.boxShadow = '0 0 0 3px rgb(16 185 129 / 0.2)';
            setTimeout(() => {
                container.style.boxShadow = '';
            }, 600);
        }

        function resetAllChecks() {
            if (!confirm('Reset all checks for today?')) return;
            
            checkedSites.clear();
            saveState();
            updateProgress();
            renderSites();
        }

        function filterSites() {
            const searchInput = document.getElementById('search-input');
            const value = searchInput.value.toLowerCase().trim();
            
            if (!value) {
                renderSites();
                return;
            }
            
            const filtered = sites.filter(site => 
                site.toLowerCase().includes(value)
            );
            
            renderSites(filtered);
        }

        function initializeSearch() {
            const searchInput = document.getElementById('search-input');
            
            searchInput.addEventListener('input', () => {
                filterSites();
            });
            
            // Clear search on Escape
            searchInput.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    searchInput.value = '';
                    renderSites();
                    searchInput.blur();
                }
            });
        }

        function initializeKeyboardShortcuts() {
            document.addEventListener('keydown', (e) => {
                // Cmd/Ctrl + K to focus search
                if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
                    e.preventDefault();
                    document.getElementById('search-input').focus();
                    document.getElementById('search-input').select();
                }
                
                // Cmd/Ctrl + Shift + R to reset
                if ((e.metaKey || e.ctrlKey) && e.shiftKey && e.key.toLowerCase() === 'r') {
                    e.preventDefault();
                    resetAllChecks();
                }
            });
            
            // Show keyboard hint in console
            console.log('%c[Daily Site Check] Keyboard shortcuts: ⌘K (search), ⌘⇧R (reset)', 'color:#64748b');
        }

        // Main initialization
        function init() {
            initializeTailwind();
            
            // Load saved state
            loadState();
            
            // Check if we need to reset for a new day
            checkAndResetIfNeeded();
            
            // Initial UI updates
            updateDateDisplay();
            updateProgress();
            
            // Render all sites
            renderSites();
            
            // Setup interactions
            initializeSearch();
            initializeKeyboardShortcuts();
            
            // Make sure progress is correct after possible reset
            setTimeout(updateProgress, 50);
            
            // Optional: Auto-refresh date at midnight (basic)
            setInterval(() => {
                const newDate = getTodayString();
                if (newDate !== lastResetDate) {
                    checkAndResetIfNeeded();
                    updateDateDisplay();
                    renderSites();
                    updateProgress();
                }
            }, 60000); // Check every minute
            
            // Welcome message in console
            console.log('%c[Daily Site Check] Web app initialized. All data stays in your browser.', 'color:#64748b');
        }

        // Boot the app
        window.onload = init;
        
        // Expose some functions globally for debugging if needed
        window.DailySiteCheck = { markAllVisited, resetAllChecks, getChecked: () => [...checkedSites] };
    </script>
